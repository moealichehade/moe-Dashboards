<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>moe_Schedule_summary</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#161b27;--surface2:#1e2535;--border:#2a3347;--accent:#4f8ef7;--accent2:#6dd5b5;--accent3:#f0a05a;--text:#e8edf5;--muted:#7a8ba8;--danger:#f07070;--panel-glow:rgba(79,142,247,0.06);--header-bg:#161b27;}
body.theme-orange{--bg:#1a0f00;--surface:#241600;--surface2:#301e00;--border:#4a3010;--accent:#ff8c00;--accent2:#ffb347;--accent3:#ff6600;--text:#fff3e0;--muted:#b08050;--danger:#ff4444;--panel-glow:rgba(255,140,0,0.07);--header-bg:#1e1100;}
body.theme-deepblue{--bg:#06101e;--surface:#0d1e35;--surface2:#142845;--border:#1e3a5a;--accent:#1e90ff;--accent2:#00c8ff;--accent3:#3db8c8;--text:#d0e8ff;--muted:#4d7aa8;--danger:#ff6b6b;--panel-glow:rgba(30,144,255,0.08);--header-bg:#0b1a2f;}
body.theme-lightgray{--bg:#f2f4f7;--surface:#ffffff;--surface2:#edf0f4;--border:#dce1ea;--accent:#3b72c4;--accent2:#28a87a;--accent3:#e07a20;--text:#1e2a3a;--muted:#7a8ba8;--danger:#d94040;--panel-glow:rgba(59,114,196,0.04);--header-bg:#ffffff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;transition:background .3s,color .3s;}
.header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px;flex-wrap:wrap;}
.header-left{display:flex;align-items:center;gap:10px;}
.logo{font-family:'DM Serif Display',serif;font-size:21px;color:var(--accent);letter-spacing:-0.5px;}
.logo span{color:var(--accent2);}
.tagline{color:var(--muted);font-size:11px;font-weight:300;}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.date-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:11px;color:var(--muted);}
.date-pill strong{color:var(--text);}
.theme-switcher{display:flex;align-items:center;gap:6px;}
.theme-label{font-size:11px;color:var(--muted);}
.theme-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;}
.theme-btn:hover{transform:scale(1.18);}
.theme-btn.active{border-color:var(--text);}
.tb-classic{background:linear-gradient(135deg,#0f1117 50%,#4f8ef7 50%);}
.tb-orange{background:linear-gradient(135deg,#1a0f00 50%,#ff8c00 50%);}
.tb-deepblue{background:linear-gradient(135deg,#06101e 50%,#1e90ff 50%);}
.tb-lightgray{background:linear-gradient(135deg,#f2f4f7 50%,#3b72c4 50%);border:1px solid #dce1ea;}
.login-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .2s;}
.login-btn:hover{opacity:.85;}
.login-btn.connected{background:rgba(109,213,181,0.2);color:var(--accent2);cursor:default;}
.selector-bar{display:flex;align-items:center;gap:8px;padding:14px 22px 0;max-width:1420px;margin:0 auto;flex-wrap:wrap;}
.sel-tab{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .2s;user-select:none;}
.sel-tab:hover{border-color:var(--accent);color:var(--text);}
.sel-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:14px 22px;max-width:1420px;margin:0 auto;}
@media(max-width:820px){.stats-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px;transition:background .3s;}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.stat-val{font-size:22px;font-weight:600;color:var(--text);line-height:1;}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:0 22px 22px;max-width:1420px;margin:0 auto;}
@media(max-width:1100px){.grid{grid-template-columns:1fr 1fr;}}
@media(max-width:680px){.grid{grid-template-columns:1fr;padding:0 12px 16px;}}
.grid.two-col{grid-template-columns:1fr 1fr;}
.grid.one-col{grid-template-columns:1fr;}
.grid-hidden{display:none;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 2px 24px var(--panel-glow);animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 15px 10px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.panel-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text);}
.panel-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.icon-cal{background:rgba(79,142,247,0.15);}
.icon-mail{background:rgba(109,213,181,0.15);}
.icon-rem{background:rgba(240,160,90,0.15);}
.dd-wrap{position:relative;}
select{appearance:none;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 26px 5px 10px;border-radius:7px;cursor:pointer;outline:none;transition:border-color .2s;}
select:hover,select:focus{border-color:var(--accent);}
.dd-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:10px;pointer-events:none;}
.panel-body{padding:6px 0;flex:1;overflow-y:auto;max-height:460px;}
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.item{padding:9px 15px;border-bottom:1px solid rgba(42,51,71,0.4);display:flex;align-items:flex-start;gap:9px;transition:background .15s;cursor:default;}
.item:hover{background:var(--surface2);}
.item:last-child{border-bottom:none;}
.item-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.item-content{flex:1;min-width:0;}
.item-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-meta{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-snippet{font-size:11px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.item-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;flex-shrink:0;margin-top:2px;white-space:nowrap;}
.b-high{background:rgba(240,112,112,0.15);color:#f07070;}
.b-med{background:rgba(240,160,90,0.15);color:#f0a05a;}
.b-low{background:rgba(79,142,247,0.15);color:#4f8ef7;}
.b-green{background:rgba(109,213,181,0.15);color:#6dd5b5;}
.b-gray{background:rgba(122,139,168,0.12);color:var(--muted);}
.empty{padding:22px 15px;text-align:center;color:var(--muted);font-size:12px;}
.loading{padding:22px 15px;text-align:center;color:var(--muted);font-size:12px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;transition:all .2s;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}
.src-tag{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;opacity:.75;margin-left:4px;vertical-align:middle;background:rgba(122,139,168,.12);color:var(--muted);}
.signin-prompt{padding:30px 20px;text-align:center;}
.signin-prompt p{color:var(--muted);font-size:12px;margin-bottom:14px;line-height:1.6;}
.signin-prompt button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;}
</style>
</head>
<body class="theme-classic">

<div class="header">
  <div class="header-left">
    <div class="logo">Moe <span>OS</span></div>
    <div class="tagline">Personal Command Center</div>
  </div>
  <div class="header-right">
    <div class="date-pill" id="live-date"><strong>Loading...</strong></div>
    <button class="login-btn" id="auth-btn" onclick="handleAuth()">🔐 Connect Google</button>
    <div class="theme-switcher">
      <span class="theme-label">Theme:</span>
      <div class="theme-btn tb-classic active" title="Classic Dark" onclick="setTheme('classic',this)"></div>
      <div class="theme-btn tb-orange" title="Full Orange" onclick="setTheme('orange',this)"></div>
      <div class="theme-btn tb-deepblue" title="Deep Blue" onclick="setTheme('deepblue',this)"></div>
      <div class="theme-btn tb-lightgray" title="Light Gray" onclick="setTheme('lightgray',this)"></div>
    </div>
  </div>
</div>

<div class="selector-bar">
  <div class="sel-tab active" onclick="togglePanel('cal',this)"><span>📅</span> Calendar</div>
  <div class="sel-tab active" onclick="togglePanel('mail',this)"><span>✉️</span> Gmail</div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-icon" style="background:rgba(79,142,247,0.12)">📅</div><div><div class="stat-val" id="stat-cal">—</div><div class="stat-label">Events this week</div></div></div>
  <div class="stat-card"><div class="stat-icon" style="background:rgba(109,213,181,0.12)">✉️</div><div><div class="stat-val" id="stat-mail">—</div><div class="stat-label">Emails · <span id="stat-unread" style="color:var(--accent)"></span></div></div></div>
</div>

<div class="grid" id="main-grid">

  <!-- CALENDAR -->
  <div class="panel" id="panel-cal">
    <div class="panel-header">
      <div class="panel-title"><div class="panel-icon icon-cal">📅</div>Calendar</div>
      <div class="dd-wrap">
        <select id="cal-src" onchange="filterCalendar()">
          <option value="all">All Calendars</option>
          <option value="primary">My Calendar</option>
          <option value="Birthdays">Birthdays</option>
        </select>
      </div>
      <div class="dd-wrap">
        <select id="cal-range" onchange="loadCalendar()">
          <option value="today">Today</option>
          <option value="week" selected>Week Ahead</option>
          <option value="weekend">Weekend</option>
          <option value="14">Next 2 Weeks</option>
          <option value="30">This Month</option>
        </select>
      </div>
      <button class="refresh-btn" onclick="loadCalendar()">↻</button>
    </div>
    <div class="panel-body" id="cal-body"><div class="signin-prompt"><p>Connect Google to see your live calendar events.</p><button onclick="handleAuth()">🔐 Connect Google</button></div></div>
  </div>

  <!-- GMAIL -->
  <div class="panel" id="panel-mail">
    <div class="panel-header">
      <div class="panel-title"><div class="panel-icon icon-mail">✉️</div>Gmail <span style="font-size:10px;background:rgba(240,112,112,0.15);color:#f07070;padding:2px 7px;border-radius:20px;margin-left:4px;font-weight:600;">UNREAD ONLY</span></div>
      <button class="refresh-btn" onclick="loadMail()">↻</button>
    </div>
    <div class="panel-body" id="mail-body"><div class="signin-prompt"><p>Connect Google to see your unread emails.</p><button onclick="handleAuth()">🔐 Connect Google</button></div></div>
  </div>

  <!-- REMINDERS (static - no Apple API) -->
  <div class="panel" id="panel-rem">
    <div class="panel-header">
      <div class="panel-title"><div class="panel-icon icon-rem">🔔</div>Reminders</div>
      <div class="dd-wrap">
        <select id="rem-list" onchange="renderReminders()">
          <option value="all">All Lists</option>
          <option value="Morning Alignments">Morning</option>
          <option value="SNHU">SNHU</option>
          <option value="MoMento24-7">MoMento</option>
          <option value="Mindful MoMento24-7">Mindful MoMento</option>
          <option value="Mindfulink">Mindfulink</option>
          <option value="Mounjaro">Mounjaro</option>
          <option value="Home">Home</option>
          <option value="Subscriptions">Subscriptions</option>
          <option value="Moe">Personal</option>
          <option value="Inbox">Inbox</option>
          <option value="Rorito">Rorito</option>
        </select>
      </div>
      <div class="dd-wrap">
        <select id="rem-priority" onchange="renderReminders()">
          <option value="all">All Priority</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="none">No Priority</option>
        </select>
      </div>
    </div>
    <div class="panel-body" id="rem-body"></div>
  </div>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const CLIENT_ID = '544721145395-pstlvshniq00gv5lgdav97nksikh1nim.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/gmail.readonly';

let tokenClient;
let accessToken = null;
let allCalEvents = [];
let allEmails = [];

// ── DATE ─────────────────────────────────────────────────────────────────────
function updateDate() {
  const now = new Date();
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('live-date').innerHTML = `<strong>${now.toLocaleDateString('en-US', opts)}</strong> &nbsp;·&nbsp; Mumbai, India`;
}
updateDate();

// ── GOOGLE IDENTITY ───────────────────────────────────────────────────────────
function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) return;
      accessToken = resp.access_token;
      document.getElementById('auth-btn').textContent = '✅ Connected';
      document.getElementById('auth-btn').classList.add('connected');
      loadCalendar();
      loadMail();
    }
  });
}

function handleAuth() {
  if (accessToken) return;
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
async function loadCalendar() {
  if (!accessToken) return;
  document.getElementById('cal-body').innerHTML = '<div class="loading">Loading calendar...</div>';
  const range = document.getElementById('cal-range').value;

  const now = new Date();
  let timeMin, timeMax;

  // Build date boundaries in local time, then convert to ISO properly
  const y = now.getFullYear(), mo = now.getMonth(), d = now.getDate();

  if (range === 'today') {
    timeMin = new Date(y, mo, d, 0, 0, 0, 0);
    timeMax = new Date(y, mo, d, 23, 59, 59, 999);
  } else if (range === 'week') {
    timeMin = new Date(y, mo, d, 0, 0, 0, 0);
    timeMax = new Date(y, mo, d + 7, 23, 59, 59, 999);
  } else if (range === 'weekend') {
    const day = now.getDay(); // 0=Sun,6=Sat,5=Fri
    // Find coming Friday (if today is Fri/Sat/Sun use this weekend)
    let daysToFri;
    if (day === 5) daysToFri = 0;
    else if (day === 6) daysToFri = -1;
    else if (day === 0) daysToFri = -2;
    else daysToFri = 5 - day;
    timeMin = new Date(y, mo, d + daysToFri, 0, 0, 0, 0);
    timeMax = new Date(y, mo, d + daysToFri + 2, 23, 59, 59, 999);
  } else {
    timeMin = new Date(y, mo, d, 0, 0, 0, 0);
    timeMax = new Date(y, mo, d + parseInt(range), 23, 59, 59, 999);
  }

  const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${timeMin.toISOString()}&timeMax=${timeMax.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=50`;

  try {
    const resp = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
    const data = await resp.json();
    allCalEvents = (data.items || []).map(e => ({
      title: e.summary || '(No title)',
      date: formatEventDate(e.start),
      src: 'My Calendar',
      color: '#4f8ef7'
    }));

    // Also fetch birthdays calendar
    try {
      const bResp = await fetch(`https://www.googleapis.com/calendar/v3/calendarList`, { headers: { Authorization: `Bearer ${accessToken}` } });
      const bData = await bResp.json();
      const birthdayCal = (bData.items || []).find(c => c.summary === 'Birthdays' || c.id.includes('contacts#contacts'));
      if (birthdayCal) {
        const bEvResp = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(birthdayCal.id)}/events?timeMin=${timeMin.toISOString()}&timeMax=${timeMax.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=20`, { headers: { Authorization: `Bearer ${accessToken}` } });
        const bEvData = await bEvResp.json();
        const bEvents = (bEvData.items || []).map(e => ({ title: e.summary || '(No title)', date: formatEventDate(e.start), src: 'Birthdays', color: '#f07070' }));
        allCalEvents = [...allCalEvents, ...bEvents];
      }
    } catch(e) {}

    document.getElementById('stat-cal').textContent = allCalEvents.length;
    filterCalendar();
  } catch(e) {
    document.getElementById('cal-body').innerHTML = '<div class="empty">Error loading calendar.</div>';
  }
}

function formatEventDate(start) {
  if (!start) return '';
  const d = new Date(start.dateTime || start.date);
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', hour: start.dateTime ? '2-digit' : undefined, minute: start.dateTime ? '2-digit' : undefined });
}

function filterCalendar() {
  const src = document.getElementById('cal-src').value;
  let items = allCalEvents;
  if (src !== 'all') items = items.filter(e => src === 'Birthdays' ? e.src === 'Birthdays' : e.src !== 'Birthdays');
  const body = document.getElementById('cal-body');
  if (!items.length) { body.innerHTML = '<div class="empty">No events found.</div>'; return; }
  body.innerHTML = items.map(e => `
    <div class="item">
      <div class="item-dot" style="background:${e.color}"></div>
      <div class="item-content">
        <div class="item-title">${e.title}</div>
        <div class="item-meta">${e.date} <span class="src-tag">${e.src}</span></div>
      </div>
    </div>`).join('');
}

// ── GMAIL (unread only) ───────────────────────────────────────────────────────
async function loadMail() {
  if (!accessToken) return;
  document.getElementById('mail-body').innerHTML = '<div class="loading">Loading unread emails...</div>';

  try {
    const resp = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=25&labelIds=INBOX&labelIds=UNREAD', {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await resp.json();
    const messages = data.messages || [];

    if (!messages.length) {
      document.getElementById('stat-mail').textContent = '0';
      document.getElementById('stat-unread').textContent = '';
      document.getElementById('mail-body').innerHTML = '<div class="empty">🎉 No unread emails!</div>';
      return;
    }

    const details = await Promise.all(messages.slice(0, 20).map(m =>
      fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      }).then(r => r.json())
    ));

    allEmails = details.map(m => {
      const headers = m.payload?.headers || [];
      const get = name => (headers.find(h => h.name === name) || {}).value || '';
      return {
        subject: get('Subject') || '(No subject)',
        sender: get('From').replace(/<.*>/, '').trim(),
        date: formatMailDate(get('Date')),
        snippet: m.snippet || ''
      };
    });

    document.getElementById('stat-mail').textContent = allEmails.length;
    document.getElementById('stat-unread').textContent = `${allEmails.length} unread`;

    const body = document.getElementById('mail-body');
    body.innerHTML = allEmails.map(e => `
      <div class="item" style="border-left:3px solid var(--accent);padding-left:12px;">
        <div class="item-dot" style="background:var(--accent)"></div>
        <div class="item-content">
          <div class="item-title" style="font-weight:700;">🔵 ${e.subject}</div>
          <div class="item-meta">${e.sender} · ${e.date} <span style="color:var(--accent);font-weight:600;font-size:10px;">UNREAD</span></div>
          <div class="item-snippet">${e.snippet}</div>
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('mail-body').innerHTML = '<div class="empty">Error loading emails.</div>';
  }
}

function formatMailDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    const today = new Date();
    if (d.toDateString() === today.toDateString()) return 'Today ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  } catch(e) { return dateStr; }
}


// ── PANEL TOGGLE ──────────────────────────────────────────────────────────────
const panelState={cal:true,mail:true};
function togglePanel(id,btn){panelState[id]=!panelState[id];btn.classList.toggle('active',panelState[id]);updateGrid();}
function updateGrid(){
  const active=Object.keys(panelState).filter(k=>panelState[k]);
  const grid=document.getElementById('main-grid');
  ['cal','mail'].forEach(id=>{const p=document.getElementById('panel-'+id);if(panelState[id])p.classList.remove('grid-hidden');else p.classList.add('grid-hidden');});
  grid.className='grid';
  if(active.length===1)grid.classList.add('one-col');
  else if(active.length===2)grid.classList.add('two-col');
}

// ── THEME ─────────────────────────────────────────────────────────────────────

<style>
/* ── THEME VARIABLES ── */
:root {
  --bg:#0f1117; --surface:#161b27; --surface2:#1e2535; --border:#2a3347;
  --accent:#4f8ef7; --accent2:#6dd5b5; --accent3:#f0a05a;
  --text:#e8edf5; --muted:#7a8ba8; --danger:#f07070;
  --panel-glow: rgba(79,142,247,0.06);
  --header-bg: #161b27;
}
body.theme-orange {
  --bg:#1a0f00; --surface:#241600; --surface2:#301e00; --border:#4a3010;
  --accent:#ff8c00; --accent2:#ffb347; --accent3:#ff6600;
  --text:#fff3e0; --muted:#b08050; --danger:#ff4444;
  --panel-glow: rgba(255,140,0,0.07);
  --header-bg: #1e1100;
}
body.theme-deepblue {
  --bg:#06101e; --surface:#0d1e35; --surface2:#142845; --border:#1e3a5a;
  --accent:#1e90ff; --accent2:#00c8ff; --accent3:#3db8c8;
  --text:#d0e8ff; --muted:#4d7aa8; --danger:#ff6b6b;
  --panel-glow: rgba(30,144,255,0.08);
  --header-bg: #0b1a2f;
}
body.theme-lightgray {
  --bg:#f2f4f7; --surface:#ffffff; --surface2:#edf0f4; --border:#dce1ea;
  --accent:#3b72c4; --accent2:#28a87a; --accent3:#e07a20;
  --text:#1e2a3a; --muted:#7a8ba8; --danger:#d94040;
  --panel-glow: rgba(59,114,196,0.04);
  --header-bg: #ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;transition:background .3s,color .3s;}
.header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px;flex-wrap:wrap;transition:background .3s,border-color .3s;}
.header-left{display:flex;align-items:center;gap:10px;}
.logo{font-family:'DM Serif Display',serif;font-size:21px;color:var(--accent);letter-spacing:-0.5px;}
.logo span{color:var(--accent2);}
.tagline{color:var(--muted);font-size:11px;font-weight:300;}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.date-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:11px;color:var(--muted);}
.date-pill strong{color:var(--text);}
.theme-switcher{display:flex;align-items:center;gap:6px;}
.theme-label{font-size:11px;color:var(--muted);margin-right:2px;}
.theme-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;}
.theme-btn:hover{transform:scale(1.18);}
.theme-btn.active{border-color:var(--text);}
.tb-classic{background:linear-gradient(135deg,#0f1117 50%,#4f8ef7 50%);}
.tb-orange{background:linear-gradient(135deg,#1a0f00 50%,#ff8c00 50%);}
.tb-deepblue{background:linear-gradient(135deg,#06101e 50%,#1e90ff 50%);}
.tb-lightgray{background:linear-gradient(135deg,#f2f4f7 50%,#3b72c4 50%);border:1px solid #dce1ea;}
.selector-bar{display:flex;align-items:center;gap:8px;padding:14px 22px 0;max-width:1420px;margin:0 auto;flex-wrap:wrap;}
.sel-tab{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .2s;user-select:none;}
.sel-tab:hover{border-color:var(--accent);color:var(--text);}
.sel-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.sel-tab .tab-icon{font-size:14px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:14px 22px;max-width:1420px;margin:0 auto;}
@media(max-width:820px){.stats-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px;transition:background .3s,border-color .3s;}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.stat-val{font-size:22px;font-weight:600;color:var(--text);line-height:1;}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:0 22px 22px;max-width:1420px;margin:0 auto;}
@media(max-width:1100px){.grid{grid-template-columns:1fr 1fr;}}
@media(max-width:680px){.grid{grid-template-columns:1fr;padding:0 12px 16px;}}
.grid.two-col{grid-template-columns:1fr 1fr;}
.grid.one-col{grid-template-columns:1fr;}
.grid-hidden{display:none;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 2px 24px var(--panel-glow);transition:background .3s,border-color .3s,box-shadow .3s;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 15px 10px;border-bottom:1px solid var(--border);gap:8px;transition:border-color .3s;}
.panel-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text);}
.panel-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.icon-cal{background:rgba(79,142,247,0.15);}
.icon-mail{background:rgba(109,213,181,0.15);}
.icon-rem{background:rgba(240,160,90,0.15);}
.dd-wrap{position:relative;}
select{appearance:none;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 26px 5px 10px;border-radius:7px;cursor:pointer;outline:none;transition:border-color .2s,background .3s;}
select:hover,select:focus{border-color:var(--accent);}
.dd-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:10px;pointer-events:none;}
.panel-body{padding:6px 0;flex:1;overflow-y:auto;max-height:460px;}
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-track{background:transparent;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.item{padding:9px 15px;border-bottom:1px solid rgba(42,51,71,0.4);display:flex;align-items:flex-start;gap:9px;transition:background .15s;cursor:default;}
.item:hover{background:var(--surface2);}
.item:last-child{border-bottom:none;}
.item-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.item-content{flex:1;min-width:0;}
.item-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-meta{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-snippet{font-size:11px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.item-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;flex-shrink:0;margin-top:2px;white-space:nowrap;}
.b-high{background:rgba(240,112,112,0.15);color:#f07070;}
.b-med{background:rgba(240,160,90,0.15);color:#f0a05a;}
.b-low{background:rgba(79,142,247,0.15);color:#4f8ef7;}
.b-green{background:rgba(109,213,181,0.15);color:#6dd5b5;}
.b-gray{background:rgba(122,139,168,0.12);color:var(--muted);}
.empty{padding:22px 15px;text-align:center;color:var(--muted);font-size:12px;}
.src-tag{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;opacity:.75;margin-left:4px;vertical-align:middle;}
</style>
</head>

function renderCalendar(){
  const src=document.getElementById('cal-src').value;
  const cat=document.getElementById('cal-cat').value;
  let items=calEvents;
  if(src!=='all')items=items.filter(e=>e.src===src);
  if(cat!=='all')items=items.filter(e=>e.cat===cat);
  const body=document.getElementById('cal-body');
  if(!items.length){body.innerHTML='<div class="empty">No events found.</div>';return;}
  body.innerHTML=items.map(e=>`<div class="item"><div class="item-dot" style="background:${e.color}"></div><div class="item-content"><div class="item-title">${e.title}</div><div class="item-meta">${e.date} <span class="src-tag" style="background:rgba(122,139,168,.12);color:var(--muted)">${e.src}</span></div></div><span class="item-badge ${calBadge(e.cat)}">${e.cat}</span></div>`).join('');
}
function calBadge(c){return{academic:'b-low',isca:'b-med',birthday:'b-high',health:'b-green',holiday:'b-gray'}[c]||'b-gray';}
function renderMail(){
  const f=document.getElementById('mail-filter').value;
  let items=emails;
  if(f==='unread')items=items.filter(e=>e.unread);
  else if(f!=='all')items=items.filter(e=>e.cat===f);
  const body=document.getElementById('mail-body');
  if(!items.length){body.innerHTML='<div class="empty">No emails found.</div>';return;}
  body.innerHTML=items.map(e=>`<div class="item" style="${e.unread?'border-left:3px solid var(--accent);padding-left:12px;':''}"><div class="item-dot" style="background:${mailDot(e.cat)}"></div><div class="item-content"><div class="item-title" style="${e.unread?'font-weight:700;':''}">${e.unread?'🔵 ':''}${e.subject}</div><div class="item-meta">${e.sender} · ${e.date}${e.unread?' <span style="color:var(--accent);font-weight:600;font-size:10px;">UNREAD</span>':''}</div><div class="item-snippet">${e.snippet}</div></div><span class="item-badge ${mailBadge(e.cat)}">${e.cat}</span></div>`).join('');
}
function mailDot(c){return{isca:'#f0a05a',sent:'#6dd5b5',notifications:'#4f8ef7'}[c]||'#7a8ba8';}
function mailBadge(c){return{isca:'b-med',sent:'b-green',notifications:'b-low'}[c]||'b-gray';}
function renderReminders(){

  const body=document.getElementById('rem-body');
  if(!items.length){body.innerHTML='<div class="empty">No reminders found.</div>';return;}
  body.innerHTML=items.map(r=>`<div class="item"><div class="item-dot" style="background:${remDot(r.priority)}"></div><div class="item-content"><div class="item-title">${r.title}</div><div class="item-meta">${r.list} · ${r.due}</div></div>${r.priority!=='none'?`<span class="item-badge ${remBadge(r.priority)}">${r.priority}</span>`:''}</div>`).join('');
}
function remDot(p){return{high:'#f07070',medium:'#f0a05a',low:'#4f8ef7',none:'var(--border)'}[p];}
function remBadge(p){return{high:'b-high',medium:'b-med',low:'b-low'}[p]||'b-gray';}
const panelState={cal:true,mail:true,rem:true};
function togglePanel(id,btn){panelState[id]=!panelState[id];btn.classList.toggle('active',panelState[id]);updateGrid();}
function updateGrid(){
  const active=Object.keys(panelState).filter(k=>panelState[k]);
  const grid=document.getElementById('main-grid');
  ['cal','mail','rem'].forEach(id=>{const p=document.getElementById('panel-'+id);if(panelState[id])p.classList.remove('grid-hidden');else p.classList.add('grid-hidden');});
  grid.className='grid';
  if(active.length===1)grid.classList.add('one-col');
  else if(active.length===2)grid.classList.add('two-col');
}
function setTheme(name,btn){document.body.className=name==='classic'?'':'theme-'+name;document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
renderCalendar();renderMail();renderReminders();
</script>
</body>
</html>
